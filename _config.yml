# Site settings
title:          Benny N.
description:    "It is a Benny Ben world."
url:            https://bennyen.github.io

# Author
author:
  name:         Benny Ng
  email:        inelaah@gmail.com
  url:          https://bennyen.github.io

# Build settings
markdown:       kramdown

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jemoji

# Permalinks
permalink:      /:year-:month-:day/:title
paginate:       5

# Related posts settings
related_posts_section:
  max_count:        5
  min_common_tags:  2

# Links to social media
social:
  github: https://github.com/bennyen
  linkedin: https://www.linkedin.com/in/benny-ng-65963a5a/
